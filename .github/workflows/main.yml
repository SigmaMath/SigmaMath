name: SigmaMath Pull Request Quality Guard

on:
  pull_request:
    branches: [ "main" ]

jobs:
  code_validation:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down a copy of your team's code onto the runner
    - name: Fetch repository code
      uses: actions/checkout@v4

    # 2. Spin up a clean Python runtime environment
    - name: Initialize Python 3.11 Environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # 2.5. Install Linux system-level virtual frame display buffers 
    - name: Install System Display Drivers (Headless Support)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-shape0

    # 3. Inject pip dependencies needed for testing (Added matplotlib)
    - name: Install Development Tools
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 flake8 black matplotlib

    # 4. Enforce team-wide syntax and style formatting checks
    - name: Check Python Code Formatting (Black)
      run: |
        black . --check --line-length 100

    # 5. Scan scripts for unhandled exceptions or broken references
    - name: Scan Code for Critical Bugs (Flake8)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # 5.5. Unit Testing Hook (Ensures PySide6 runs inside a virtual screen engine)
    - name: Execute Core Parser Tests
      run: |
        xvfb-run --server-args="-screen 0 1024x768x24" python -c "print('Ready for unit test scripts!')"

    # 6. Safety check to catch typos or unclosed brackets in your stylesheet
    - name: Validate UI CSS Stylesheet Integrity
      run: |
        python -c "
        try:
            with open('gui/style.css', 'r') as f:
                content = f.read()
                if content.count('{') != content.count('}'):
                    print('Error: Mismatch in open/close curly brackets in style.css!'); exit(1)
                print('style.css blocks verified successfully.')
        except FileNotFoundError:
            print('style.css not found yet, skipping check.')
        "
